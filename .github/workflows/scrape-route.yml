name: 🚴 Scrape MapMyRide Route

on:
  workflow_dispatch:
    inputs:
      route_id:
        description: 'MapMyRide Route ID (number from URL)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🌐 Check network connectivity
        run: |
          echo "Testing network connectivity..."
          curl -I https://registry.npmjs.org/ --max-time 10
          echo "Network test completed"

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📚 Install dependencies
        run: |
          echo "Starting npm ci at $(date)"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          timeout 120 npm ci --verbose --prefer-offline
          echo "npm ci completed at $(date)"

      - name: 🔍 Validate route ID
        run: |
          ROUTE_ID="${{ github.event.inputs.route_id }}"
          if ! [[ "$ROUTE_ID" =~ ^[0-9]+$ ]]; then
            echo "❌ Error: Route ID must be numeric"
            exit 1
          fi
          echo "✅ Route ID validated: $ROUTE_ID"

      - name: 🚴 Run scraper
        run: |
          npm run scrape -- ${{ github.event.inputs.route_id }} 2>&1 | tee scrape.log
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "SCRAPE_ERROR=true" >> $GITHUB_ENV
            echo "SCRAPE_LOG<<EOF" >> $GITHUB_ENV
            cat scrape.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
          exit $exit_code

      - name: 📤 Upload screenshot artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: route-screenshot-${{ github.event.inputs.route_id }}
          path: output/*.png
          retention-days: 90

      - name: ❌ Handle failure
        if: failure()
        run: |
          echo "❌ Scraping failed for route ID: ${{ github.event.inputs.route_id }}"
          echo "📋 Error details:"
          echo "$SCRAPE_LOG"
          exit 1
